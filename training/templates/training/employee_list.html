{% extends 'training/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Employees</h2>
    <a href="{% url 'employee_add' %}" class="btn btn-success">+ Add Employee</a>
</div>

<!-- Filter Section -->
<div class="mb-3 p-3 bg-white rounded border">
    <form method="get" class="d-flex align-items-center">
        <label for="department" class="me-2 fw-bold">Filter: Department</label>
        <select name="department" id="department" class="form-select form-select-sm w-auto me-2">
            <option value="">All</option>
            {% for code, name in departments %}
            <option value="{{ code }}" {% if selected_dept == code %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn btn-secondary btn-sm">Filter</button>
        <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary btn-sm ms-2">Reset</a>
    </form>
</div>

<table class="table table-striped table-bordered bg-white shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Dept</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for emp in employees %}
        <tr>
            <td>{{ emp.full_name }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.department }}</td>
            <td>
                <a href="{% url 'employee_edit' emp.pk %}" class="btn btn-sm btn-primary">Edit</a>
                <a href="{% url 'employee_delete' emp.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center text-muted">No employees found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
