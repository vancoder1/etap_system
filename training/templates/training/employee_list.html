{% extends 'training/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Employees</h2>
    <a href="{% url 'employee_add' %}" class="btn btn-success">+ Add Employee</a>
</div>

<!-- Placeholder for Filter eventually requested in Step 4B -->
<div class="mb-3 p-2 bg-white rounded border">
    <span>Filter: Department [Dropdown pending]</span>
</div>

<table class="table table-striped table-bordered bg-white shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Dept</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for emp in employees %}
        <tr>
            <td>{{ emp.full_name }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.department }}</td>
            <td>
                <a href="{% url 'employee_edit' emp.pk %}" class="btn btn-sm btn-primary">Edit</a>
                <a href="{% url 'employee_delete' emp.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center text-muted">No employees found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
