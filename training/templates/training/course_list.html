{% extends 'training/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Courses</h2>
    <a href="{% url 'course_add' %}" class="btn btn-success">+ Add Course</a>
</div>

<!-- Filter Section -->
<div class="mb-3 p-3 bg-white rounded border">
    <form method="get" class="d-flex align-items-center">
        <label for="category" class="me-2 fw-bold">Filter: Category</label>
        <select name="category" id="category" class="form-select form-select-sm w-auto me-2">
            <option value="">All</option>
            {% for code, name in categories %}
            <option value="{{ code }}" {% if selected_cat == code %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn btn-secondary btn-sm">Filter</button>
        <a href="{% url 'course_list' %}" class="btn btn-outline-secondary btn-sm ms-2">Reset</a>
    </form>
</div>

<table class="table table-striped table-bordered bg-white shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Duration (min)</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for course in courses %}
        <tr>
            <td>{{ course.title }}</td>
            <td>{{ course.category }}</td>
            <td>{{ course.duration_minutes }}</td>
            <td>
                <a href="{% url 'course_edit' course.pk %}" class="btn btn-sm btn-primary">Edit</a>
                <a href="{% url 'course_delete' course.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center text-muted">No courses found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
