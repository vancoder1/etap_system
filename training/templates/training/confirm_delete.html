{% extends 'training/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-4">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirm Deletion</h4>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete the record for <strong>"{{ object }}"</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger mt-3 w-100">Yes, delete</button>
                    <!-- Alternatively, use a back trace -->
                    <a href="javascript:history.back()" class="btn btn-secondary mt-2 w-100">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
